events {
    worker_connections 1024;
}

http {
    upstream vllm {
        server vllm-server:8000;
    }

    # Rate limiting: 10 req/s por IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    server {
        listen 80;
        server_name _;

        # Redirigir a HTTPS si tienes certificado
        # return 301 https://$host$request_uri;

        location / {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://vllm;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Timeouts largos para inference
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;

            # Soporte streaming (SSE)
            proxy_buffering off;
            proxy_cache off;
        }
    }

    # Descomenta y configura si tienes certificados SSL
    # server {
    #     listen 443 ssl;
    #     server_name tu-dominio.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #
    #     location / {
    #         limit_req zone=api burst=20 nodelay;
    #         proxy_pass http://vllm;
    #         proxy_set_header Host $host;
    #         proxy_read_timeout 300s;
    #         proxy_buffering off;
    #     }
    # }
}
