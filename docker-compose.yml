services:
  vllm-server:
    image: vllm/vllm-openai:gemma4-cu130
    container_name: vllm-gemma
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN}
    ipc: host
    devices:
      - nvidia.com/gpu=0
    command: >
      --model ${MODEL_ID:-google/gemma-4-E4B-it}
      --tensor-parallel-size ${GPU_COUNT:-1}
      --max-model-len ${MAX_MODEL_LEN:-16384}
      --dtype auto
      --served-model-name gemma
      --enforce-eager
      ${EXTRA_VLLM_ARGS:-}
    restart: unless-stopped
