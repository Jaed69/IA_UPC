services:
  vllm-server:
    image: vllm/vllm-openai:v0.19.0-cu130
    container_name: vllm-gemma
    runtime: nvidia
    expose:
      - "8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN}
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-1}
              capabilities: [gpu]
    command: >
      --model ${MODEL_ID:-google/gemma-3-27b-it}
      --tensor-parallel-size ${GPU_COUNT:-1}
      --max-model-len ${MAX_MODEL_LEN:-8192}
      --dtype auto
      --api-key ${VLLM_API_KEY}
      --served-model-name gemma
    restart: always

  nginx:
    image: nginx:alpine
    container_name: vllm-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - vllm-server
    restart: always
